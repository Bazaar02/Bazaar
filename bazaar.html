<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mock Stock Market — News Feed</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F0E8;
    --ink: #1A1208;
    --paper: #FDFAF4;
    --rule: #D4C9B0;
    --bravo: #1B3A6B;
    --bravo-light: #E8EEF7;
    --alpha: #8B1A1A;
    --alpha-light: #F7E8E8;
    --pos: #2D5A1B;
    --pos-bg: #EBF5E4;
    --neg: #8B1A1A;
    --neg-bg: #F7E8E8;
    --neu: #5A4A1B;
    --neu-bg: #F5F0DC;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: ‘DM Sans’, sans-serif;
background: var(–cream);
color: var(–ink);
min-height: 100vh;
}

/* MASTHEAD */
.masthead {
border-bottom: 3px double var(–ink);
padding: 18px 24px 14px;
text-align: center;
background: var(–paper);
position: relative;
}
.masthead-kicker {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 3px;
text-transform: uppercase;
color: #888;
margin-bottom: 6px;
}
.masthead-title {
font-family: ‘Playfair Display’, serif;
font-size: clamp(22px, 5vw, 36px);
font-weight: 700;
letter-spacing: -0.5px;
line-height: 1;
}
.masthead-sub {
font-size: 11px;
color: #888;
margin-top: 6px;
font-style: italic;
font-family: ‘Playfair Display’, serif;
}
.masthead-rule {
border: none;
border-top: 1px solid var(–rule);
margin: 10px 0 0;
}

/* LAYOUT */
.shell {
max-width: 760px;
margin: 0 auto;
padding: 0 16px 40px;
}

/* COMPANY TABS */
.company-tabs {
display: grid;
grid-template-columns: 1fr 1fr;
border-bottom: 2px solid var(–ink);
margin-top: 20px;
}
.company-tab {
padding: 12px 16px;
text-align: center;
cursor: pointer;
font-family: ‘DM Mono’, monospace;
font-size: 11px;
letter-spacing: 2px;
text-transform: uppercase;
color: #888;
border-bottom: 3px solid transparent;
margin-bottom: -2px;
transition: all 0.2s;
background: transparent;
}
.company-tab:hover { color: var(–ink); }
.company-tab.active-bravo { color: var(–bravo); border-bottom-color: var(–bravo); font-weight: 500; }
.company-tab.active-alpha { color: var(–alpha); border-bottom-color: var(–alpha); font-weight: 500; }
.company-tab .ticker {
display: block;
font-size: 18px;
font-family: ‘Playfair Display’, serif;
font-weight: 700;
letter-spacing: 0;
margin-bottom: 2px;
}

/* ARC STRIP */
.arc-strip {
font-size: 11px;
font-style: italic;
font-family: ‘Playfair Display’, serif;
padding: 8px 14px;
margin: 14px 0;
border-left: 3px solid;
}
.arc-fall { border-color: var(–neg); color: var(–neg); background: var(–neg-bg); }
.arc-rise { border-color: var(–pos); color: var(–pos); background: var(–pos-bg); }

/* SECTION HEADERS */
.section-head {
display: flex;
align-items: center;
gap: 12px;
margin: 20px 0 10px;
}
.section-label {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 3px;
text-transform: uppercase;
padding: 3px 10px;
border-radius: 2px;
white-space: nowrap;
font-weight: 500;
}
.label-pos { background: var(–pos-bg); color: var(–pos); }
.label-neg { background: var(–neg-bg); color: var(–neg); }
.label-neu { background: var(–neu-bg); color: var(–neu); }
.section-rule { flex: 1; height: 1px; background: var(–rule); }

/* ARTICLE CARDS */
.articles { display: flex; flex-direction: column; gap: 0; }
.article {
border-bottom: 1px solid var(–rule);
padding: 14px 0;
cursor: pointer;
}
.article:last-child { border-bottom: none; }
.article-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.article-headline {
font-family: ‘Playfair Display’, serif;
font-size: 15px;
font-weight: 700;
line-height: 1.35;
flex: 1;
transition: color 0.15s;
}
.article:hover .article-headline { color: #555; }
.article-date {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
color: #999;
white-space: nowrap;
margin-top: 3px;
}
.article-body {
display: none;
margin-top: 10px;
padding-top: 10px;
border-top: 1px dashed var(–rule);
}
.article-body.open { display: block; }
.article-body p {
font-size: 13px;
line-height: 1.7;
color: #333;
}
.impact-line {
margin-top: 10px;
font-family: ‘DM Mono’, monospace;
font-size: 11px;
padding: 5px 10px;
border-radius: 2px;
display: inline-block;
font-weight: 500;
}
.impact-pos { background: var(–pos-bg); color: var(–pos); }
.impact-neg { background: var(–neg-bg); color: var(–neg); }
.impact-neu { background: var(–neu-bg); color: var(–neu); }

.chevron {
font-size: 10px;
color: #aaa;
margin-top: 4px;
transition: transform 0.2s;
flex-shrink: 0;
}
.article.open .chevron { transform: rotate(180deg); }

/* FOOTER */
.footer-rule { border: none; border-top: 3px double var(–ink); margin: 32px 0 12px; }
.footer-text { text-align: center; font-size: 11px; color: #aaa; font-style: italic; font-family: ‘Playfair Display’, serif; }
</style>

</head>
<body>

<div class="masthead">
  <div class="masthead-kicker">Simulated Market Exercise · Confidential</div>
  <div class="masthead-title">The Trading Floor Gazette</div>
  <div class="masthead-sub">All the news that moves markets — click any headline to read</div>
  <hr class="masthead-rule">
</div>

<div class="shell">

  <div class="company-tabs">
    <div class="company-tab active-bravo" onclick="switchCompany('bravo')">
      <span class="ticker">BRVT</span>Bravo Technologies
    </div>
    <div class="company-tab" onclick="switchCompany('alpha')">
      <span class="ticker">ALPM</span>Alpha Motors
    </div>
  </div>

  <div id="arc-strip" class="arc-strip arc-fall"></div>
  <div id="news-container"></div>

  <hr class="footer-rule">
  <div class="footer-text">For simulation purposes only. All companies, events and persons are fictional.</div>
</div>

            body: "Bravo's transparency report is technically thorough but conspicuously avoids the server outage, the whistleblower complaint, or the missing employee case. Privacy advocates call it 'performative.' Investors call it 'sufficient.' Nobody calls it honest.",

  },

            body: "Nobody paid for it. Ananya Kapoor — with 42 million Instagram followers — posts a spontaneous reel driving through Mumbai in an Alpha Vertex EV, windows down, song playing. The video hits 60 million views in two days. 'Is Alpha the new status symbol?' trends nationally. Test drive bookings spike overnight.",

          },

          },

            body: "As Pune robotics come fully online, 1,200 blue-collar workers are cut. This time there is no strategic repositioning narrative. Former workers speak to local TV. Labour unions in three states call for boycotts. The human cost of automation arrives — and it is not abstract.",
            impact: "↓ −12% — Consumer backlash and union pressure damage brand perception"
          },
          {
            headline: "CEO Dilan Marsh named in Epstein files — photo shows him on the island",
            date: "Q3, Yr 2",

          },
          {
            headline: "Marsh claims photograph is AI-generated — experts disagree, internet makes memes",
            date: "Q3, Yr 2",
            body: "In a live TV interview Marsh looks into the camera and calls the photo 'an AI-fabricated hit job.' Image forensic analysts are split — some find generation artefacts, others don't. What is not split: public opinion. 'CEO claims AI photo' is a meme within 24 hours. Sales continue to slip.",

          },

          }

          },

          },
          {

            date: "Q3, Yr 3",
            body: "The law firm concludes: no evidence linking Marsh to Epstein's criminal enterprise. The photograph was taken at a legitimate Mumbai industry conference Epstein had also attended — context that was never part of the original news cycle. The board issues a full statement of confidence. Short positions scramble to cover.",

          },

            headline: "Alpha announces EU manufacturing tie-up in Portugal — Pune tariffs rendered moot",

};

let currentCompany = 'bravo';
let openArticles = new Set();

function switchCompany(co) {
  currentCompany = co;
  openArticles.clear();
  document.querySelectorAll('.company-tab').forEach((t, i) => {
    t.className = 'company-tab';
    if (i === 0 && co === 'bravo') t.classList.add('active-bravo');
    if (i === 1 && co === 'alpha') t.classList.add('active-alpha');
  });
  render();
}

function toggleArticle(id) {
  if (openArticles.has(id)) openArticles.delete(id);
  else openArticles.add(id);
  render();
}

function render() {
  const co = data[currentCompany];
  const strip = document.getElementById('arc-strip');
  strip.className = 'arc-strip arc-' + co.arc;
  strip.textContent = co.arcText;

  const sectionLabels = { positive: 'Positive', negative: 'Negative', neutral: 'Neutral' };
  const impactClass = { positive: 'impact-pos', negative: 'impact-neg', neutral: 'impact-neu' };
  const labelClass = { positive: 'label-pos', negative: 'label-neg', neutral: 'label-neu' };

  let html = '';
  co.sections.forEach(section => {
    html += `<div class="section-head">
      <span class="section-label ${labelClass[section.type]}">${sectionLabels[section.type]}</span>
      <div class="section-rule"></div>
    </div>
    <div class="articles">`;

    section.articles.forEach((art, i) => {
      const id = section.type + i;
      const isOpen = openArticles.has(id);
      html += `<div class="article ${isOpen ? 'open' : ''}" onclick="toggleArticle('${id}')">
        <div class="article-top">
          <div>
            <div class="article-headline">${art.headline}</div>
            <div class="article-date">${currentCompany.toUpperCase()} · ${art.date}</div>
          </div>
          <div class="chevron">▼</div>
        </div>
        <div class="article-body ${isOpen ? 'open' : ''}">
          <p>${art.body}</p>
          <div class="impact-line ${impactClass[section.type]}">${art.impact}</div>
        </div>
      </div>`;
    });

    html += `</div>`;
  });

  document.getElementById('news-container').innerHTML = html;
}

render();
</script>
